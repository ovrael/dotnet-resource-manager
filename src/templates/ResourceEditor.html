<!doctype html>
<html>
  <style>
    .bottom-container {
      height: 25%;
      width: 100%;
      min-height: 200px;
      min-width: 300px;
      overflow: auto;
    }

    .options-container {
      overflow: auto;
      height: 100%;
      width: 50%;
    }

    .actions-container {
      overflow: auto;
      height: 100%;
      width: 50%;
    }

    .button-container {
      height: 50px;
      width: 50%;
      padding: 10px 5px;
    }

    .action-button {
      background-color: black;
      border: solid 1px rgb(73, 116, 217);
      border-radius: 0px;
      color: rgb(73, 116, 217);
    }
    .action-button:hover {
      background-color: rgb(73, 116, 217);
      border: solid 1px black;
      border: 0px;
      border-radius: 0px;
      color: black;
    }

    .table-container {
      width: 100%;
      max-height: 70%;
      min-height: 20px;
      overflow: auto;
    }

    .div-table {
      box-sizing: border-box;
      display: table;
      width: 100%;
      border-collapse: collapse; /* zamiast border-spacing */
      border: 2px solid rgba(73, 116, 217);
    }

    .div-table-row {
      display: table-row;
      width: auto;
      clear: both;
      min-height: 20px;
      max-height: fit-content;
      resize: vertical;
    }

    .empty-row {
      background-color: rgb(241, 115, 115);
    }

    .div-table-cell {
      display: table-cell;
      min-width: 200px;
      height: fit-content;
      vertical-align: top;
      border-collapse: collapse; /* zamiast border-spacing */
      border: 1px solid rgb(73, 116, 217);
      padding: 2px;
    }

    .cell-header {
      text-transform: capitalize;
      font-size: 14px;
      font-weight: bold;
    }

    .cell-value {
      font-size: 12px;
    }

    .cell-short {
      width: 200px;
    }

    .cell-long {
      width: auto;
    }

    .resource-input {
      width: 100%;
      min-height: 20px; /* startowa wysokość */
      resize: none;
      overflow: hidden; /* bez scrollbarów */
      box-sizing: border-box;
      color: var(--vscode-editor-foreground);
    }

    .textarea-reset {
      background: transparent;
      border: none;
      outline: none;
      box-shadow: none;

      appearance: none; /* reset stylów systemowych */
      -webkit-appearance: none;
      -moz-appearance: none;

      padding: 0;
      margin: 0;

      font: inherit; /* dziedziczy font z rodzica */
      color: inherit; /* dziedziczy kolor tekstu */
    }

    .ask-dialog {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background-color: var(--vscode-editor-background);
      border: 2px solid rgb(73, 116, 217);
      padding: 20px;
      z-index: 1000;
    }

    .ask-dialog.good-input {
      border: 2px solid rgb(83, 217, 73);
    }
    .ask-dialog.bad-input {
      border: 2px solid rgb(217, 73, 73);
    }

    .ask-dialog-title {
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .ask-dialog-content {
      font-size: 14px;
      margin-bottom: 20px;
    }

    .ask-dialog-text {
      margin-bottom: 10px;
    }

    .ask-dialog-actions {
      display: flex;
      justify-content: flex-end;
    }

    .ask-dialog-action-button {
      background-color: transparent;
      border: solid 1px rgb(73, 116, 217);
      color: rgb(73, 116, 217);
      padding: 5px 10px;
      margin-left: 10px;
    }
    .ask-dialog-action-button:hover {
      background-color: rgb(73, 116, 217);
      border: solid 1px transparent;
      color: white;
    }

    .cancel-button {
      background-color: transparent;
      border: solid 1px rgb(241, 115, 115);
      color: rgb(241, 115, 115);
    }
    .cancel-button:hover {
      background-color: rgb(241, 115, 115);
      border: solid 1px transparent;
      color: white;
    }

    .confirm-button {
      background-color: transparent;
      border: solid 1px rgb(73, 116, 217);
      color: rgb(73, 116, 217);
    }
    .confirm-button:hover {
      background-color: rgb(73, 116, 217);
      border: solid 1px transparent;
      color: white;
    }

    .confirm-button:disabled {
      background-color: transparent;
      border: solid 1px rgb(150, 150, 150);
      color: rgb(150, 150, 150);
      cursor: not-allowed;
    }
  </style>

  <body>
    <div id="ask-dialog" class="ask-dialog" hidden>
      <div id="askDialogTitle" class="ask-dialog-title">
        Ask user for something
      </div>
      <div id="askDialogContent" class="ask-dialog-content">
        <div id="askDialogText" class="ask-dialog-text"></div>
        <div id="askDialogInputContainer" hidden>
          <input
            id="askDialogInput"
            type="text"
            style="width: 100%; box-sizing: border-box"
          />
        </div>
      </div>
      <div id="askDialogActions" class="ask-dialog-actions">
        <button
          id="askDialogCancelButton"
          class="ask-dialog-action-button cancel-button"
        >
          Cancel
        </button>
        <button
          id="askDialogConfirmButton"
          class="ask-dialog-action-button confirm-button"
        >
          OK
        </button>
      </div>
    </div>

    <div style="font-size: large">
      <span> DotNet Resource Manager Editor for: </span>
      <span id="fileNameHeader"> </span>
    </div>

    <div id="resourceContent" class="table-container">
      <div id="resourceTable" class="div-table">
        <div id="resourceTableHeader" class="div-table-row">
          <div id="nameHeader" class="div-table-cell cell-header cell-short">
            Name
          </div>
          <!-- default culture header -->
          <div
            id="CultureHeader"
            class="div-table-cell cell-header cell-long"
            data-cultureindex="0"
          >
            Default
          </div>
          <div id="commentHeader" class="div-table-cell cell-header cell-short">
            Comment
          </div>
        </div>
        <!--
        EXAMPLE
          <div id="[resourceName]Row" class="div-table-row">
            <div id="[resourceName]Name"    class="div-table-cell">Name</div>
            <div id="[resourceName]Culture" class="div-table-cell">Default culture</div>
            <div id="[resourceName]Comment" class="div-table-cell">Comment</div>
          </div>
        -->
      </div>
    </div>

    <div id="editorBottom" class="bottom-container">
      <div id="editorOptions" class="options-container"></div>
      <div id="editorActions" class="actions-container">
        <div class="button-container">
          <button id="addValueButton" class="action-button">Add value</button>
        </div>
        <div class="button-container">
          <button id="addCultureButton" class="action-button">
            Add culture
          </button>
        </div>
      </div>
    </div>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        class ResourceRow {
          /** @type {string} */
          name;
          /** @type {string} */
          comment;

          /** @type {ResourceData[]} */
          data;
        }

        class ResourceData {
          /** @type {string} */
          language;
          /** @type {string} */
          value;
        }

        const vscode = acquireVsCodeApi();

        /** @type {HTMLDivElement} */
        let resourceTable = undefined;

        /** @type {ResourceRow[]} */
        let resourceRows = [];

        /** @type {string[]} */
        let cultures = [];

        function createTableHeaders() {
          const commentHeaderElement = document.getElementById("commentHeader");

          let cultureIndexHeader = 1;
          for (const culture of cultures) {
            const cultureName = culture === undefined ? "" : culture;
            const id = `${cultureName}CultureHeader`;
            const headerElement = document.getElementById(id);

            if (!headerElement) {
              const cultureHeader = document.createElement("div");
              cultureHeader.id = id;
              cultureHeader.innerText = culture;
              cultureHeader.className = `div-table-cell cell-header cell-long`;
              cultureHeader.dataset.cultureindex = cultureIndexHeader;
              cultureIndexHeader++;

              // cultureIndex.set(culture, cultureIndexHeader);
              commentHeaderElement.parentNode.insertBefore(
                cultureHeader,
                commentHeaderElement,
              );
            }
          }
        }

        function createTextarea(name, value, type, culture) {
          const textarea = document.createElement("textarea");
          textarea.dataset.name = name;
          textarea.dataset.type = type;
          textarea.className = `resource-input textarea-reset`;
          textarea.value = value;

          if (culture) {
            textarea.dataset.culture = culture;
          }

          addTextareaEvents(textarea, value, type, undefined);

          return textarea;
        }

        function createRowElement(/** @type {ResourceRow} **/ resourceRow) {
          const rowElement = document.createElement("div");
          rowElement.id = `${resourceRow.name}Row`;
          rowElement.className = `div-table-row`;

          const nameElement = document.createElement("div");
          nameElement.id = `${resourceRow.name}Name`;
          nameElement.className = `div-table-cell cell-value cell-short`;

          const nameTextareaElement = createTextarea(
            resourceRow.name,
            resourceRow.name,
            "name",
            undefined,
          );

          nameElement.appendChild(nameTextareaElement);

          rowElement.appendChild(nameElement);

          for (const culture of cultures) {
            const valueElement = document.createElement("div");
            const data = resourceRow.data.find((d) => d.language === culture);
            valueElement.id = `${resourceRow.name}_${culture}Value`;
            // valueElement.textContent = data.value;
            valueElement.className = `div-table-cell cell-value cell-long`;

            let trueValue = data === undefined ? "" : data.value;
            const valueTextareaElement = createTextarea(
              resourceRow.name,
              trueValue,
              "value",
              culture,
            );

            valueElement.appendChild(valueTextareaElement);

            rowElement.appendChild(valueElement);
          }

          const commentElement = document.createElement("div");
          commentElement.id = `${resourceRow.name}Comment`;
          commentElement.textContent = resourceRow.comment;
          commentElement.className = `div-table-cell cell-value cell-short`;

          const commentTextareaElement = createTextarea(
            resourceRow.name,
            resourceRow.comment,
            "comment",
            undefined,
          );
          commentElement.appendChild(commentTextareaElement);

          rowElement.appendChild(commentElement);

          const textareas = rowElement.getElementsByTagName("textarea");
          let empty = true;
          for (const textarea of textareas) {
            textarea.addEventListener("input", () => {
              for (const ta of textareas) {
                if (ta.value.length > 0) {
                  empty = false;
                  break;
                }
              }

              if (empty) {
                rowElement.classList.add("empty-row");
              } else {
                rowElement.classList.remove("empty-row");
              }
            });
          }

          return rowElement;
        }

        function createTableRows() {
          for (const resourceRow of resourceRows) {
            const rowElement = createRowElement(resourceRow);
            resourceTable.appendChild(rowElement);
          }
        }

        function addTextareaEvents(
          /** @type {HTMLTextAreaElement}**/ textarea,
          rowName,
          type,
          culture,
        ) {
          const resize = () => {
            if (textarea.scrollHeight >= 0) {
              textarea.style.height = "auto";
              textarea.style.height = textarea.scrollHeight + "px";
            }
          };

          /** @type {ResourceRow} **/
          const resourceRow = resourceRows.find((r) => r.name === rowName);

          const updateData = (textarea) => {
            if (!resourceRow) return;

            switch (type) {
              case "name":
                resourceRow.name = textarea.value;
                textarea.dataset.name = resourceRow.name;
                break;
              case "value":
                let data = resourceRow.data.find((d) => d.language === culture);
                if (!data) {
                  data = { language: culture, value: "" };
                  resourceRow.data.push(data);
                }
                data.value = textarea.value;
                break;
              case "comment":
                resourceRow.comment = textarea.value;
                break;
              default:
                break;
            }
          };

          textarea.addEventListener("input", resize);
          textarea.addEventListener("input", updateData);
          textarea.addEventListener("input", sendTextareaChange);

          setTimeout(() => {
            resize();
          }, 500);
        }

        function initButtons() {
          const askDialog = document.getElementById("ask-dialog");

          const dialogConfirmButton = document.getElementById(
            "askDialogConfirmButton",
          );

          const dialogCancelButton = document.getElementById(
            "askDialogCancelButton",
          );
          const dialogInput = document.getElementById("askDialogInput");

          dialogCancelButton.onclick = (event) => {
            askDialog.hidden = true;
            dialogConfirmButton.onclick = null;
            dialogInput.oninput = null;
          };

          const addValueButton = document.getElementById("addValueButton");
          addValueButton.onclick = (event) => {
            const dialogTitle = document.getElementById("askDialogTitle");
            const dialogText = document.getElementById("askDialogText");
            const dialogInputContainer = document.getElementById(
              "askDialogInputContainer",
            );

            dialogTitle.innerText = "Add new resource value";
            dialogText.innerText = "Enter name for new resource value:";
            dialogInputContainer.hidden = false;
            dialogInput.value = ``;
            dialogInput.placeholder = `New Value #${resourceRows.length + 1}`;

            dialogInput.oninput = (event) => {
              const name = dialogInput.value.trim();
              if (name.length === 0) {
                askDialog.classList.remove("good-input");
                askDialog.classList.add("bad-input");
                dialogConfirmButton.disabled = true;
                return;
              }

              const existingRow = resourceRows.find((r) => r.name === name);
              if (existingRow === undefined) {
                askDialog.classList.remove("bad-input");
                askDialog.classList.add("good-input");
                dialogConfirmButton.disabled = false;
              } else {
                askDialog.classList.remove("good-input");
                askDialog.classList.add("bad-input");
                dialogConfirmButton.disabled = true;
              }
            };

            dialogConfirmButton.onclick = (event) => {
              const name = dialogInput.value.trim();

              const newRow = new ResourceRow();
              newRow.name = name;
              newRow.data = [];
              newRow.comment = "";

              for (const culture of cultures) {
                const newData = new ResourceData();
                newData.language = culture;
                newData.value = "";

                newRow.data.push(newData);
              }

              resourceRows.push(newRow);

              const rowElement = createRowElement(newRow);
              resourceTable.appendChild(rowElement);

              askDialog.hidden = true;
              dialogConfirmButton.onclick = null;
              dialogInput.oninput = null;
            };

            askDialog.hidden = false;
          };
        }

        //#region Send to client methods

        function sendTextareaChange() {
          vscode.postMessage({
            type: "updateResources",
            data: resourceRows,
          });
        }

        // element is 'row' or 'culture'
        function sendRemoveChange(element, name) {
          if (element !== "row" && element !== "culture") {
            console.warn(`Unknown element to remove: ${element}`);
            return;
          }

          vscode.postMessage({
            type: "removeChange",
            element: element,
            name: name,
          });
        }

        function sendAddRow() {
          vscode.postMessage({
            type: "updateResources",
            data: resourceRows,
          });
        }

        function sendAddCulture() {
          vscode.postMessage({
            type: "updateResources",
            data: resourceRows,
          });
        }

        //#endregion

        window.addEventListener("message", (event) => {
          const data = event.data;
          if (data.type === "init") {
            resourceTable = document.getElementById("resourceTable");
            if (!resourceTable) {
              console.warn(`Something went horribly wrong, there is no table?`);
              return;
            }

            const fileNameHeader = document.getElementById("fileNameHeader");
            fileNameHeader.innerHTML = data.fileName;

            cultures = data.cultures;
            resourceRows = data.resourceRows;

            createTableHeaders();
            createTableRows();

            initButtons();
          }
        });
      });
    </script>
  </body>
</html>
