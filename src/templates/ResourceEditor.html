<!doctype html>
<html>
  <style>
    .bottom-container {
      height: 25%;
      width: 100%;
      min-height: 200px;
      min-width: 300px;
      overflow: auto;
    }

    .options-container {
      overflow: auto;
      height: 100%;
      width: 50%;
    }

    .actions-container {
      overflow: auto;
      height: 100%;
      width: 50%;
    }

    .button-container {
      height: 50px;
      width: 50%;
      padding: 10px 5px;
    }

    .action-button {
      background-color: black;
      border: solid 1px rgb(204, 69, 69);
      border-radius: 0px;
      color: rgb(204, 69, 69);
    }
    .action-button:hover {
      background-color: rgb(204, 69, 69);
      border: solid 1px black;
      border: 0px;
      border-radius: 0px;
      color: black;
    }

    .table-container {
      width: 100%;
      height: fit-content;
      height: 70%;
      overflow: auto;
    }

    .div-table {
      box-sizing: border-box;
      display: table;
      width: 100%;
      border-collapse: collapse; /* zamiast border-spacing */
      border: 2px solid rgba(204, 69, 69);
    }

    .div-table-row {
      display: table-row;
      width: auto;
      clear: both;
      min-height: 20px;
      max-height: fit-content;
      resize: vertical;
    }

    .div-table-cell {
      display: table-cell;
      min-width: 200px;
      height: fit-content;
      vertical-align: top;
      border-collapse: collapse; /* zamiast border-spacing */
      border: 1px solid rgb(204, 69, 69);
      padding: 2px;
    }

    .cell-header {
      text-transform: capitalize;
      font-size: 14px;
      font-weight: bold;
    }

    .cell-value {
      font-size: 12px;
    }

    .cell-short {
      width: 200px;
    }

    .cell-long {
      width: auto;
    }

    .resource-input {
      width: 100%;
      min-height: 20px; /* startowa wysokość */
      resize: none;
      overflow: hidden; /* bez scrollbarów */
      box-sizing: border-box;
      color: var(--vscode-editor-foreground);
    }

    .textarea-reset {
      background: transparent;
      border: none;
      outline: none;
      box-shadow: none;

      appearance: none; /* reset stylów systemowych */
      -webkit-appearance: none;
      -moz-appearance: none;

      padding: 0;
      margin: 0;

      font: inherit; /* dziedziczy font z rodzica */
      color: inherit; /* dziedziczy kolor tekstu */
    }
  </style>

  <body>
    <div style="font-size: large">
      <span> DotNet Resource Manager Editor for: </span>
      <span id="fileNameHeader"> </span>
    </div>

    <div id="resourceContent" class="table-container">
      <div id="resourceTable" class="div-table">
        <div id="resourceTableHeader" class="div-table-row">
          <div id="nameHeader" class="div-table-cell cell-header cell-short">
            Name
          </div>
          <!-- default culture header -->
          <div
            id="CultureHeader"
            class="div-table-cell cell-header cell-long"
            data-cultureindex="0"
          >
            Default
          </div>
          <div id="commentHeader" class="div-table-cell cell-header cell-short">
            Comment
          </div>
        </div>
        <!--
        EXAMPLE
          <div id="[resourceName]Row" class="div-table-row">
            <div id="[resourceName]Name"    class="div-table-cell">Name</div>
            <div id="[resourceName]Culture" class="div-table-cell">Default culture</div>
            <div id="[resourceName]Comment" class="div-table-cell">Comment</div>
          </div>
        -->
      </div>
    </div>

    <div id="editorBottom" class="bottom-container">
      <div id="editorOptions" class="options-container"></div>
      <div id="editorActions" class="actions-container">
        <div class="button-container">
          <button id="addValueButton" class="action-button">Add value</button>
        </div>
        <div class="button-container">
          <button id="addCultureButton" class="action-button">
            Add culture
          </button>
        </div>
      </div>
    </div>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        class ResourceFile {
          uri;
          /** @type {string} */
          text;
          /** @type {string} */
          clearFileName;
          /** @type {string} */
          language;

          /** @type {ResourceFileDataRecord[]} */
          dataRecords;
        }

        class ResourceFileDataRecord {
          /** @type {string} */
          name;
          /** @type {string} */
          value;
          /** @type {string} */
          comment;
        }

        class ResourceRow {
          /** @type {string} */
          name;
          /** @type {string} */
          comment;

          /** @type {ResourceData[]} */
          data;
        }

        class ResourceData {
          /** @type {string} */
          language;
          /** @type {string} */
          value;
        }

        const vscode = acquireVsCodeApi();

        /** @type {HTMLDivElement} */
        let resourceTable = undefined;
        /** @type {ResourceFile[]} */
        let inputResources = [];
        /** @type {ResourceRow[]} */
        let resourceRows = [];

        /** @type {string[]} */
        let cultures = [];
        /** @type {string[]} */
        let resourceNames = [];

        function fillResourceData() {
          // Get all cultures, get all value names
          /** @type {Set<string>} */
          const uniqueCultures = new Set();
          /** @type {Set<string>} */
          const uniqueResourceNames = new Set();
          for (let i = 0; i < inputResources.length; i++) {
            uniqueCultures.add(inputResources[i].language);
            for (let j = 0; j < inputResources[i].dataRecords.length; j++) {
              uniqueResourceNames.add(inputResources[i].dataRecords[j].name);
            }
          }

          cultures = [...uniqueCultures];
          resourceNames = [...uniqueResourceNames];
        }

        function fillResourceRows() {
          resourceRows = [];

          for (let i = 0; i < cultures.length; i++) {
            const resourceFile = inputResources.find(
              (r) => r.language === cultures[i],
            );

            if (!resourceFile) {
              continue;
            }

            for (let j = 0; j < resourceNames.length; j++) {
              let record = resourceFile.dataRecords.find(
                (r) => r.name === resourceNames[j],
              );

              if (!record) {
                record = new ResourceFileDataRecord();
                record.name = resourceNames[j];
                record.value = "";
                record.comment = "";
              }

              /** @type {ResourceRow} */
              const row = resourceRows.find((r) => r.name === record.name);

              const newData = new ResourceData();
              newData.language = cultures[i];
              newData.value = record.value;

              if (row === undefined) {
                const newRow = new ResourceRow();
                newRow.name = record.name;
                newRow.comment = record.comment ?? "";
                newRow.data = [];
                newRow.data.push(newData);

                resourceRows.push(newRow);
              } else {
                row.data.push(newData);
              }
            }
          }
        }

        function createTableHeaders() {
          const commentHeaderElement = document.getElementById("commentHeader");

          let cultureIndexHeader = 1;
          for (const culture of cultures) {
            const cultureName = culture === undefined ? "" : culture;
            const id = `${cultureName}CultureHeader`;
            const headerElement = document.getElementById(id);

            if (!headerElement) {
              const cultureHeader = document.createElement("div");
              cultureHeader.id = id;
              cultureHeader.innerText = culture;
              cultureHeader.className = `div-table-cell cell-header cell-long`;
              cultureHeader.dataset.cultureindex = cultureIndexHeader;
              cultureIndexHeader++;

              // cultureIndex.set(culture, cultureIndexHeader);
              commentHeaderElement.parentNode.insertBefore(
                cultureHeader,
                commentHeaderElement,
              );
            }
          }
        }

        function createTextarea(name, value, type, culture) {
          const textarea = document.createElement("textarea");
          textarea.dataset.name = name;
          textarea.dataset.type = type;
          textarea.className = `resource-input textarea-reset`;
          textarea.value = value;

          if (culture) {
            textarea.dataset.culture = culture;
          }

          addTextareaEvents(textarea, value, type, undefined);

          return textarea;
        }

        function createRowElement(/** @type {ResourceRow} **/ resourceRow) {
          const rowElement = document.createElement("div");
          rowElement.id = `${resourceRow.name}Row`;
          rowElement.className = `div-table-row`;

          const nameElement = document.createElement("div");
          nameElement.id = `${resourceRow.name}Name`;
          nameElement.className = `div-table-cell cell-value cell-short`;

          const nameTextareaElement = createTextarea(
            resourceRow.name,
            resourceRow.name,
            "name",
            undefined,
          );

          nameElement.appendChild(nameTextareaElement);

          rowElement.appendChild(nameElement);

          for (const culture of cultures) {
            const valueElement = document.createElement("div");
            const data = resourceRow.data.find((d) => d.language === culture);
            valueElement.id = `${resourceRow.name}_${culture}Value`;
            // valueElement.textContent = data.value;
            valueElement.className = `div-table-cell cell-value cell-long`;

            let trueValue = data === undefined ? "" : data.value;
            const valueTextareaElement = createTextarea(
              resourceRow.name,
              trueValue,
              "value",
              culture,
            );

            valueElement.appendChild(valueTextareaElement);

            rowElement.appendChild(valueElement);
          }

          const commentElement = document.createElement("div");
          commentElement.id = `${resourceRow.name}Comment`;
          commentElement.textContent = resourceRow.comment;
          commentElement.className = `div-table-cell cell-value cell-short`;

          const commentTextareaElement = createTextarea(
            resourceRow.name,
            resourceRow.comment,
            "comment",
            undefined,
          );
          commentElement.appendChild(commentTextareaElement);

          rowElement.appendChild(commentElement);

          return rowElement;
        }

        function createTableRows() {
          for (const resourceRow of resourceRows) {
            const rowElement = createRowElement(resourceRow);
            resourceTable.appendChild(rowElement);
          }
        }

        function sendResourcesToClient() {
          vscode.postMessage({
            type: "updateResources",
            data: resourceRows,
          });
        }

        function addTextareaEvents(
          /** @type {HTMLTextAreaElement}**/ textarea,
          rowName,
          type,
          culture,
        ) {
          const resize = () => {
            if (textarea.scrollHeight >= 0) {
              textarea.style.height = "auto";
              textarea.style.height = textarea.scrollHeight + "px";
            }
          };

          /** @type {ResourceRow} **/
          const resourceRow = resourceRows.find((r) => r.name === rowName);

          const updateData = (textarea) => {
            if (!resourceRow) return;

            switch (type) {
              case "name":
                resourceRow.name = textarea.value;
                textarea.dataset.name = resourceRow.name;
                break;
              case "value":
                let data = resourceRow.data.find((d) => d.language === culture);
                if (!data) {
                  data = { language: culture, value: "" };
                  resourceRow.data.push(data);
                }
                data.value = textarea.value;
                break;
              case "comment":
                resourceRow.comment = textarea.value;
                break;
              default:
                break;
            }
          };

          textarea.addEventListener("input", resize);
          textarea.addEventListener("input", updateData);
          textarea.addEventListener("input", sendResourcesToClient);

          setTimeout(() => {
            resize();
          }, 500);
        }

        function initButtons() {
          const addValueButton = document.getElementById("addValueButton");
          addValueButton.onclick = (event) => {
            const newRow = new ResourceRow();
            newRow.name = `New Value #${resourceRows.length + 1}`;
            newRow.data = [];
            newRow.comment = "";

            for (const culture of cultures) {
              const newData = new ResourceData();
              newData.language = culture;
              newData.value = "";

              newRow.data.push(newData);
            }

            resourceRows.push(newRow);

            const rowElement = createRowElement(newRow);
            resourceTable.appendChild(rowElement);
          };
        }

        function sendResourcesToClient() {
          vscode.postMessage({
            type: "updateResources",
            data: resourceRows,
          });
        }

        window.addEventListener("message", (event) => {
          const data = event.data;
          if (data.type === "init") {
            resourceTable = document.getElementById("resourceTable");
            if (!resourceTable) {
              console.warn(`Something went horribly wrong, there is no table?`);
              return;
            }

            const fileNameHeader = document.getElementById("fileNameHeader");
            fileNameHeader.innerHTML = data.fileName;
            inputResources = data.resources;

            fillResourceData();
            fillResourceRows();

            createTableHeaders();
            createTableRows();

            initButtons();
          }
        });
      });
    </script>
  </body>
</html>
